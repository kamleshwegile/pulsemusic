name: Deploy Web Frontend to Amazon ECS

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'pulse-web/**'

env:
  AWS_REGION: "us-east-1"
  PROJECT_NAME: "pulsemusic"
  ENVIRONMENT: "dev"
  AWS_ROLE_ARN: "arn:aws:iam::072160582486:role/pulsemusic-dev-github-actions"

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  deploy-web:
    name: Deploy Web Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Web image to Amazon ECR
        id: build-web-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-pulse-web
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd pulse-web
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-pulse-web --query taskDefinition > task-def-web.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def-web
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-web.json
          container-name: pulse-web
          image: ${{ steps.build-web-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-web.outputs.task-definition }}
          service: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-pulse-web-svc
          cluster: ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster
          wait-for-service-stability: true
